<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shell explain</title>
  <link rel="icon" type="image/svg+xml" href="../../images/favicon.svg" />
  <link rel="stylesheet" href="../../theme.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>SHELL EXPLAIN</h1>
    <p class="subtitle">Annotated shell command library</p>
    <a id="home-btn" href="../../" title="Back to homepage">~/</a>
    <button id="theme-btn" title="Toggle theme">&#9788;</button>
  </header>

  <div class="top-bar">
    <div class="search-bar">
      <div class="search-wrap">
        <input
          type="text"
          id="search-input"
          placeholder="search commands…"
          spellcheck="false"
          autocomplete="off"
        />
      </div>
      <button id="add-btn">+ Add Command</button>
    </div>
    <div id="cat-filters" class="cat-filters hidden"></div>
  </div>

  <main>
    <div id="cmd-list"></div>
    <p id="empty-state" class="empty-state hidden"></p>
  </main>

  <!-- Add / Edit modal -->
  <div id="add-modal" class="modal hidden">
    <div class="modal-box">
      <button id="modal-close" class="close-btn" aria-label="Close">&#10005;</button>
      <h2 class="modal-title" id="modal-title-text">ADD COMMAND</h2>

      <div class="modal-field">
        <label for="modal-command">Command</label>
        <input
          type="text"
          id="modal-command"
          spellcheck="false"
          autocomplete="off"
          placeholder="e.g. grep -rn 'pattern' ."
        />
      </div>

      <div class="modal-field">
        <label for="modal-desc">Description</label>
        <input
          type="text"
          id="modal-desc"
          placeholder="What does this command do?"
        />
      </div>

      <div class="modal-field">
        <label>Categories <span class="modal-label-hint">(optional — press Enter or , to add)</span></label>
        <div class="modal-cat-row" id="modal-cat-row">
          <div id="modal-cat-chips"></div>
          <input type="text" id="modal-cat-input" placeholder="e.g. files" autocomplete="off" spellcheck="false" />
        </div>
      </div>

      <div class="modal-parts-section">
        <div class="modal-parts-header">
          <span class="modal-section-label">Parts</span>
          <button type="button" id="add-part-btn">+ Add Part</button>
        </div>
        <div id="modal-parts"></div>
      </div>

      <p id="modal-error" class="modal-error hidden"></p>

      <div class="modal-actions">
        <button type="button" id="modal-cancel">CANCEL</button>
        <button type="button" id="modal-save">SAVE</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js")</script>
</body>
</html>
